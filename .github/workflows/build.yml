name: Build Installer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mi-config-installer-linux-amd64
            goos: linux
            goarch: amd64
          - os: macos-latest
            artifact: mi-config-installer-darwin-amd64
            goos: darwin
            goarch: amd64
          - os: macos-latest
            artifact: mi-config-installer-darwin-arm64
            goos: darwin
            goarch: arm64
          - os: windows-latest
            artifact: mi-config-installer-windows.exe
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd installer
          go mod tidy
          go build -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/mi-config-installer

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: installer/${{ matrix.artifact }}
