name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'installer/**'
      - '.github/workflows/**'
      - 'scripts/**'
      - 'windows/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.6) - leave empty for auto bump'
        required: false

permissions:
  contents: write

jobs:
  # Step 1: Determine version (no tag created yet)
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            # Auto bump patch version from last tag
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION="${LAST_TAG#v}"
            IFS='.' read -r major minor patch <<< "$VERSION"
            NEW_VERSION="v$major.$minor.$((patch + 1))"
            VERSION="$NEW_VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Determined version: $VERSION"

  # Step 2: Build mi-config installers (parallel, no release created yet)
  build:
    needs: version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mi-config-installer-linux-amd64
            goos: linux
            goarch: amd64
          - os: macos-latest
            artifact: mi-config-installer-darwin-amd64
            goos: darwin
            goarch: amd64
          - os: macos-latest
            artifact: mi-config-installer-darwin-arm64
            goos: darwin
            goarch: arm64
          - os: windows-latest
            artifact: mi-config-installer-windows.exe
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd installer
          go mod tidy
          go build -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/mi-config-installer

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: installer/${{ matrix.artifact }}
          tag_name: ${{ needs.version.outputs.version }}
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Step 3: Build engram from fork (parallel)
  build-engram:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout engram fork
        uses: actions/checkout@v4
        with:
          repository: Andressc19/engram
          path: engram
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build engram for all platforms
        run: |
          cd engram
          go mod tidy
          
          # Linux AMD64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${{ needs.version.outputs.version }}" -o engram_linux_amd64 ./cmd/engram
          
          # Linux ARM64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${{ needs.version.outputs.version }}" -o engram_linux_arm64 ./cmd/engram
          
          # macOS AMD64
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${{ needs.version.outputs.version }}" -o engram_darwin_amd64 ./cmd/engram
          
          # macOS ARM64
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${{ needs.version.outputs.version }}" -o engram_darwin_arm64 ./cmd/engram
          
          # Windows AMD64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${{ needs.version.outputs.version }}" -o engram_windows_amd64.exe ./cmd/engram
          
          # Windows ARM64
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${{ needs.version.outputs.version }}" -o engram_windows_arm64.exe ./cmd/engram
          
          # Install zip for Windows archives
          apt-get update && apt-get install -y zip
          
          # Create archives
          tar -czf engram_linux_amd64.tar.gz engram_linux_amd64
          tar -czf engram_linux_arm64.tar.gz engram_linux_arm64
          tar -czf engram_darwin_amd64.tar.gz engram_darwin_amd64
          tar -czf engram_darwin_arm64.tar.gz engram_darwin_arm64
          zip engram_windows_amd64.zip engram_windows_amd64.exe
          zip engram_windows_arm64.zip engram_windows_arm64.exe

      - name: Upload engram binaries to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            engram/engram_linux_amd64.tar.gz
            engram/engram_linux_arm64.tar.gz
            engram/engram_darwin_amd64.tar.gz
            engram/engram_darwin_arm64.tar.gz
            engram/engram_windows_amd64.zip
            engram/engram_windows_arm64.zip
          tag_name: ${{ needs.version.outputs.version }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Step 4: Create tag and publish release (ONLY if ALL builds succeed)
  create-release:
    needs: [version, build, build-engram]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git tag ${{ needs.version.outputs.version }}
          git push origin ${{ needs.version.outputs.version }}

      - name: Publish release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.version }}
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
