name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'installer/**'
      - 'scripts/**'
      - 'windows/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.6) - leave empty for auto bump'
        required: false

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            LAST_TAG=$(git tag --sort=-version:refname | head -n1)
            if [[ -z "$LAST_TAG" ]]; then
              LAST_TAG="v0.0.0"
            fi
            VERSION="${LAST_TAG#v}"
            IFS='.' read -r major minor patch <<< "$VERSION"
            patch=$((patch + 1))
            VERSION="v$major.$minor.$patch"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Determined version: $VERSION"

  build-installers:
    needs: version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mi-config-installer-linux-amd64
            goos: linux
            goarch: amd64
          - os: macos-latest
            artifact: mi-config-installer-darwin-amd64
            goos: darwin
            goarch: amd64
          - os: macos-latest
            artifact: mi-config-installer-darwin-arm64
            goos: darwin
            goarch: arm64
          - os: windows-latest
            artifact: mi-config-installer-windows.exe
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd installer
          go mod tidy
          go build -ldflags="-s -w" -o ${{ matrix.artifact }} ./cmd/mi-config-installer

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mi-config-${{ matrix.artifact }}
          path: installer/${{ matrix.artifact }}

  build-engram:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout engram fork
        uses: actions/checkout@v4
        with:
          repository: Andressc19/engram
          path: engram
          ref: main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build engram
        run: |
          cd engram
          go mod tidy
          
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o engram_linux_amd64 ./cmd/engram
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o engram_linux_arm64 ./cmd/engram
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o engram_darwin_amd64 ./cmd/engram
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o engram_darwin_arm64 ./cmd/engram
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o engram_windows_amd64.exe ./cmd/engram
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o engram_windows_arm64.exe ./cmd/engram
          
          mkdir -p dist
          mv engram_* dist/
          
          tar -czf dist/engram_linux_amd64.tar.gz -C dist engram_linux_amd64
          tar -czf dist/engram_linux_arm64.tar.gz -C dist engram_linux_arm64
          tar -czf dist/engram_darwin_amd64.tar.gz -C dist engram_darwin_amd64
          tar -czf dist/engram_darwin_arm64.tar.gz -C dist engram_darwin_arm64
          zip dist/engram_windows_amd64.zip dist/engram_windows_amd64.exe
          zip dist/engram_windows_arm64.zip dist/engram_windows_arm64.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: engram-binaries
          path: engram/dist

  release:
    needs: [version, build-installers, build-engram]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: installers
          pattern: mi-config-*
          merge-multiple: true

      - name: Download engram
        uses: actions/download-artifact@v4
        with:
          name: engram-binaries
          path: engram

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/*
            engram/*
          tag_name: ${{ needs.version.outputs.version }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release
        run: |
          TAG="${{ needs.version.outputs.version }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on remote, skipping..."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
